server {
    listen 80;
    server_name app.zaplavanderia.com.br;

    # Redireciona tudo para HTTPS (após instalar o certbot)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.zaplavanderia.com.br;

    # Certificados (gerados pelo certbot)
    ssl_certificate /etc/letsencrypt/live/app.zaplavanderia.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.zaplavanderia.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Frontend React (arquivos estáticos)
    root /opt/zaplavanderia/painel/dist;
    index index.html;

    # SPA: redireciona tudo pro index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API: proxy para o backend Node
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;

        # WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Body maior para webhooks
        client_max_body_size 15M;

        # Timeout para WebSocket
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
