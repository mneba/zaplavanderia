services:
  postgres:
    image: postgres:16-alpine
    container_name: zap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zapadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: zaplavanderia
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zapadmin -d zaplavanderia"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: ./app
    container_name: zap-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://zapadmin:${POSTGRES_PASSWORD}@postgres:5432/zaplavanderia?schema=public
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      AI_MODEL: ${AI_MODEL:-claude-haiku-4-5}
      PORT: 3000
      SESSOES_DIR: /data/sessoes
    volumes:
      - sessoes_data:/data/sessoes
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
  sessoes_data:
